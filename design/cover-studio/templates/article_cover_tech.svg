<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <title>Article Cover Tech Template</title>
  <desc>A modern, tech-focused article cover with grid and glow effects.</desc>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0B" />
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Content Area (Safe Area: 100, 80, 1000, 470) -->
  <!-- Main Title -->
  <text x="100" y="300" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#F8FAFC" letter-spacing="2">
    TECH ARTICLE TITLE
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="380" font-family="system-ui, sans-serif" font-size="28" fill="#94A3B8">
    A deep dive into modern architecture and SVG creation
  </text>
  
  <!-- Abstract Decorative Element -->
  <circle cx="1000" cy="315" r="150" fill="url(#mainGradient)" opacity="0.15" filter="url(#glow)" />
  <path d="M 850 315 Q 1000 150 1150 315 T 1000 480 Z" fill="none" stroke="url(#mainGradient)" stroke-width="2" opacity="0.5" />
  
  <!-- Badge -->
  <rect x="100" y="100" width="120" height="32" rx="16" fill="#1E293B" />
  <text x="160" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#3B82F6">
    TUTORIAL
  </text>
</svg>
